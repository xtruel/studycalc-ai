<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="0.55" stop-color="#6d28d9"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.3" cy="0.25" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#dfe3ea"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#16233b"/>
    </linearGradient>
    <linearGradient id="sgrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
  </defs>

  <!-- sfondo blu-viola -->
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <rect width="1024" height="1024" fill="url(#glow)"/>

  <!-- corpo calcolatrice old-school -->
  <g>
    <rect x="280" y="168" width="464" height="688" rx="64" fill="#11182b" opacity="0.28"/>
    <rect x="272" y="160" width="480" height="688" rx="62" fill="url(#body)" stroke="#c3c9d6" stroke-width="3"/>

    <!-- striscia pannello solare (dettaglio retrò) -->
    <g opacity="0.85">
      <rect x="320" y="200" width="180" height="48" rx="10" fill="#1f2937"/>
      <line x1="350" y1="200" x2="350" y2="248" stroke="#374151" stroke-width="3"/>
      <line x1="380" y1="200" x2="380" y2="248" stroke="#374151" stroke-width="3"/>
      <line x1="410" y1="200" x2="410" y2="248" stroke="#374151" stroke-width="3"/>
      <line x1="440" y1="200" x2="440" y2="248" stroke="#374151" stroke-width="3"/>
      <line x1="470" y1="200" x2="470" y2="248" stroke="#374151" stroke-width="3"/>
    </g>
    <circle cx="690" cy="224" r="14" fill="#cbd5e1" stroke="#94a3b8" stroke-width="3"/>

    <!-- display con la S -->
    <rect x="320" y="280" width="384" height="200" rx="22" fill="url(#screen)" stroke="#0a0f1d" stroke-width="4"/>
    <rect x="336" y="296" width="352" height="168" rx="14" fill="none" stroke="none" />
    <text x="512" y="466" font-family="Arial, Helvetica, sans-serif" font-size="210" font-weight="800"
          text-anchor="middle" fill="url(#sgrad)">S</text>

    <!-- tastiera old-school: 4x4 tasti chunky -->
    <g>
      <!-- helper: file di tasti -->
      <!-- row 1 -->
      <g fill="#eef1f6" stroke="#c3c9d6" stroke-width="3">
        <rect x="320" y="520" width="78" height="66" rx="16"/>
        <rect x="418" y="520" width="78" height="66" rx="16"/>
        <rect x="516" y="520" width="78" height="66" rx="16"/>
      </g>
      <rect x="626" y="520" width="78" height="66" rx="16" fill="url(#sgrad)"/>
      <!-- row 2 -->
      <g fill="#eef1f6" stroke="#c3c9d6" stroke-width="3">
        <rect x="320" y="602" width="78" height="66" rx="16"/>
        <rect x="418" y="602" width="78" height="66" rx="16"/>
        <rect x="516" y="602" width="78" height="66" rx="16"/>
      </g>
      <rect x="626" y="602" width="78" height="66" rx="16" fill="url(#sgrad)"/>
      <!-- row 3 -->
      <g fill="#eef1f6" stroke="#c3c9d6" stroke-width="3">
        <rect x="320" y="684" width="78" height="66" rx="16"/>
        <rect x="418" y="684" width="78" height="66" rx="16"/>
        <rect x="516" y="684" width="78" height="66" rx="16"/>
      </g>
      <rect x="626" y="684" width="78" height="66" rx="16" fill="url(#sgrad)"/>
      <!-- row 4: tasto largo "=" accent -->
      <g fill="#eef1f6" stroke="#c3c9d6" stroke-width="3">
        <rect x="320" y="766" width="78" height="66" rx="16"/>
        <rect x="418" y="766" width="176" height="66" rx="16"/>
      </g>
      <rect x="626" y="766" width="78" height="66" rx="16" fill="#f59e0b"/>
    </g>
  </g>
</svg>
