# =============================================================================
# StudyCalc AI — Build iOS su Mac in CLOUD (Codemagic) e invio ad App Store Connect.
#
# A cosa serve: compila l'app su un Mac in cloud (NON ti serve Xcode sul tuo Mac)
# e la carica automaticamente su App Store Connect / TestFlight.
#
# COSA DEVI FARE UNA VOLTA SOLA su https://codemagic.io  (vedi PUBBLICAZIONE-CLOUD.md):
#   1. Collega questo repository GitHub.
#   2. Team settings → Integrations → App Store Connect → carica una API key
#      (creata su App Store Connect → Users and Access → Integrations → Keys).
#      Dai all'integrazione il nome:  CODEMAGIC_ASC_KEY  (o cambia il nome qui sotto).
#   3. Avvia il workflow "ios-appstore".
# =============================================================================
workflows:
  ios-appstore:
    name: StudyCalc AI - iOS App Store
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: CODEMAGIC_ASC_KEY   # <-- nome dell'API key configurata in Codemagic
    environment:
      vars:
        BUNDLE_ID: "com.studycalc.app"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_VERSION: "1.0.0"
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Installa dipendenze JS
        script: npm install --legacy-peer-deps

      - name: Test del motore matematico
        script: npm test

      - name: Build web (modalità app)
        script: npm run build:app

      - name: Aggiungi piattaforma iOS e sincronizza
        script: |
          if [ ! -d "ios" ]; then npx cap add ios; fi
          npx cap sync ios

      - name: Genera icona e splash (il tuo logo) per iOS
        script: |
          # crea l'icona da SVG se manca il PNG, poi genera tutte le misure iOS
          if [ ! -f assets/icon.png ] && [ -f assets/icon-source.svg ]; then
            npx -y sharp-cli -i assets/icon-source.svg -o assets/icon.png resize 1024 1024 || true
          fi
          npx @capacitor/assets generate --ios || true
          npx cap sync ios

      - name: Inserisci i permessi privacy (fotocamera/foto) in Info.plist
        script: |
          PLIST="ios/App/App/Info.plist"
          add() { /usr/libexec/PlistBuddy -c "Add :$1 string $2" "$PLIST" 2>/dev/null \
                 || /usr/libexec/PlistBuddy -c "Set :$1 $2" "$PLIST"; }
          add NSCameraUsageDescription "Usiamo la fotocamera per leggere gli esercizi di matematica dalle tue foto, direttamente sul dispositivo."
          add NSPhotoLibraryUsageDescription "Accediamo alle foto per leggere gli esercizi dalle immagini che selezioni, direttamente sul dispositivo."
          add NSPhotoLibraryAddUsageDescription "Salviamo eventuali immagini elaborate nella tua galleria."

      - name: Imposta versione e build number
        script: |
          cd ios/App
          agvtool new-marketing-version "$APP_VERSION"
          # Build number = numero di build Codemagic (sempre crescente, richiesto da Apple)
          agvtool new-version -all "$PROJECT_BUILD_NUMBER"

      - name: Installa i Pod (CocoaPods)
        script: |
          cd ios/App && pod install

      - name: Firma — CREA automaticamente certificato e profilo
        script: |
          keychain initialize
          # crea (se non esistono) Bundle ID, certificato di distribuzione e provisioning profile
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Compila l'IPA firmato
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      # Invia automaticamente la build a TestFlight (per provarla subito).
      # Per pubblicare direttamente sullo Store metti submit_to_app_store: true
      # (richiede che la scheda App Store sia già compilata: descrizione, screenshot...).
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
