workflows:
  ios-appstore:
    name: StudyCalc AI - iOS App Store
    instance_type: mac_mini_m2
    max_build_duration: 60
    working_directory: studycalc-ai
    integrations:
      app_store_connect: CODEMAGIC_ASC_KEY
    environment:
      vars:
        BUNDLE_ID: "com.studycalc.app"
        APP_VERSION: "1.0.0"
      node: 22
      xcode: latest
      cocoapods: default
    scripts:
      - name: Installa dipendenze JS
        script: npm install --legacy-peer-deps
      - name: Build web
        script: npm run build:app
      - name: Aggiungi iOS pulito e sync
        script: |
          rm -rf ios
          npx cap add ios
          npx cap sync ios
      - name: Genera icona e splash
        script: |
          npx @capacitor/assets generate --ios || true
          npx cap sync ios
      - name: Permessi privacy
        script: |
          PLIST="ios/App/App/Info.plist"
          add() { /usr/libexec/PlistBuddy -c "Add :$1 string $2" "$PLIST" 2>/dev/null || /usr/libexec/PlistBuddy -c "Set :$1 $2" "$PLIST"; }
          add NSCameraUsageDescription "Usiamo la fotocamera per leggere gli esercizi dalle tue foto, sul dispositivo."
          add NSPhotoLibraryUsageDescription "Accediamo alle foto per leggere gli esercizi dalle immagini selezionate."
          add NSPhotoLibraryAddUsageDescription "Salviamo le immagini elaborate nella tua galleria."
